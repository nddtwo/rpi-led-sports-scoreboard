# The following scenes will be displayed in the order specified. Will loop once complete.
scene_order:
  # - nhl_fav_team_next_game
  # - pwhl_fav_team_next_game
  # - nba_fav_team_next_game
  # - wnba_fav_team_next_game
  # - mlb_fav_team_next_game

  # - nhl_games
  # - pwhl_games
  # - nba_games
  # - wnba_games
  - mlb_games

  # - nhl_fav_team_next_game
  # - pwhl_fav_team_next_game
  # - nba_fav_team_next_game
  # - wnba_fav_team_next_game
  # - mlb_fav_team_next_game
  
  # - nhl_standings
  # - pwhl_standings
  # - nba_standings
  # - wnba_standings
  # - mlb_standings


# Note your favourite teams by league. Any number of teams can be specified.
favourite_teams:
  nhl:
    - BOS # Example.
  pwhl:
    - TOR # Example.
  nba:
    - TOR # Example.
  wnba:
    - TOR # Example.
  mlb:
    - TOR # Example.


# Note alt logos that should be used. Any number of teams can have an alt logo, but each team is limited to a single alt logo at a time.
alt_logos:
  nhl:
    # SJS: 1998 # Example.
  pwhl:
    # OTT: 'Red' # Example.
  nba:
    # UTA: 2004 # Example.
  wnba:
    # SEA: 2000 # Example.
  mlb:
    ATL: 'Cap' # Example.


# Settings for each scene.
scene_settings:
  # Hockey - NHL, PWHL.
  nhl:
    games: # nhl_games scene.
      transition: 'modern'
      splash:
        display_splash: True
        splash_display_duration: 2
      game_display_duration: 3.5
      score_alerting:
        score_coloured: true
        score_fade_animation: true
      rollover:
        rollover_start_time_local: '07:00'
        show_completed_games_until_rollover_end_time: True
        rollover_end_time_local: '12:00'

    fav_team_next_game: # nhl_fav_team_next_game scene.
      transition: 'modern'
      display_duration: 3.5
      display_if_in_progress: True

    standings: # nhl_standings scene.
      transition: 'modern'
      splash:
        display_splash: True
        splash_display_duration: 2
      scroll:
        scroll_pause_duration: 1
        scroll_frame_duration: 0.075
      highlight_fav_teams: True
      colour_sidebar: True
      display_for:
        - wildcard
        # - conference
        # - division
        # - league

  pwhl:
    games: # pwhl_games scene.
      transition: 'modern'
      splash:
        display_splash: True
        splash_display_duration: 2
      game_display_duration: 3.5
      score_alerting:
        score_coloured: true
        score_fade_animation: true
      rollover:
        rollover_start_time_local: '07:00'
        show_completed_games_until_rollover_end_time: True
        rollover_end_time_local: '12:00'

    fav_team_next_game: # pwhl_fav_team_next_game scene.
      transition: 'modern'
      display_duration: 3.5
      display_if_in_progress: True

    standings: # pwhl_standings scene.
      transition: 'modern'
      splash:
        display_splash: True
        splash_display_duration: 2
      scroll:
        scroll_pause_duration: 1
        scroll_frame_duration: 0.075
      highlight_fav_teams: True
      colour_sidebar: True
      display_for:
        - league
  
  # Basketball - NBA, WNBA.
  nba:
    games: # nba_games scene.
      transition: 'modern'
      splash:
        display_splash: True
        splash_display_duration: 2
      game_display_duration: 3.5
      score_alerting:
        score_coloured: false
        score_fade_animation: false
      rollover:
        rollover_start_time_local: '07:00'
        show_completed_games_until_rollover_end_time: True
        rollover_end_time_local: '12:00'

    fav_team_next_game: # nba_fav_team_next_game scene.
      transition: 'modern'
      display_duration: 3.5
      display_if_in_progress: True

    standings: # nba_standings scene.
      transition: 'modern'
      splash:
        display_splash: True
        splash_display_duration: 2
      scroll:
        scroll_pause_duration: 1
        scroll_frame_duration: 0.075
      highlight_fav_teams: True
      colour_sidebar: True
      display_for:
        - conference
        # - division

  wnba:
    games: # wnba_games scene.
      transition: 'modern'
      splash:
        display_splash: True
        splash_display_duration: 2
      game_display_duration: 3.5
      score_alerting:
        score_coloured: false
        score_fade_animation: false
      rollover:
        rollover_start_time_local: '07:00'
        show_completed_games_until_rollover_end_time: True
        rollover_end_time_local: '12:00'

    fav_team_next_game: # wnba_fav_team_next_game scene.
      transition: 'modern'
      display_duration: 3.5
      display_if_in_progress: True

    standings: # wnba_standings scene.
      transition: 'modern'
      splash:
        display_splash: True
        splash_display_duration: 2
      scroll:
        scroll_pause_duration: 1
        scroll_frame_duration: 0.075
      highlight_fav_teams: True
      colour_sidebar: True
      display_for:
        - league

  # Baseball - MLB.
  mlb:
    games: # mlb_games scene.
      transition: 'modern'
      splash:
        display_splash: False
        splash_display_duration: 2
      game_display_duration: 3.5
      display_outs_and_bases: True
      score_alerting:
        score_coloured: True
        score_fade_animation: True
      rollover:
        rollover_start_time_local: '07:00'
        show_completed_games_until_rollover_end_time: True
        rollover_end_time_local: '12:00'
        

# Brightness settings.
brightness:
  brightness_mode: 'static' #'auto', 'static'.
  max_brightness: 100


# Hardware configuration details.
hardware_config:
  hardware_mapping: 'adafruit-hat-pwm' # Adjust to match your hardware.
  gpio_slowdown: 4 # 0-4. Adjust as needed for your hardware.
